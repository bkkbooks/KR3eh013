body:
  text: 自敘醫者意也以我之意揣病之情始終洞悉然後可以為醫但天下之意有有本之意有無本之意無本者師心自用未嘗有所聞見妄而不可為訓也有本者得之師資鑑之往昔論一症訂一方皆有上下千古之識不敢以己意為臆逆也然而幾此亦甚難矣晉朝以前司是術者類皆縉紳先生苦心濟世精言微論卓有可觀後世用為糊口之術文人學士概不與焉脈理方論已自不工而又當兵火之後醫經殘缺湊合成書其中雖有可採之說精奧難解不可從者十之六七若非臨症參考將何去而何從乎豫不敏忝生名閥當以書香為急不幸稚年失怙疊罹水患不能沉心於舉業一生虛度何以告無罪於祖宗然而擇術於醫固為溫飽之計而刪述纂修之功固當亦有責焉於是訪投明師講習數年其所獲者醫學之規矩已耳法律已耳臨症不無少隔因思孟子有云大匠誨人能與人規矩不能使人巧孔子曰吾道一以貫之是知學道之功始而求其中規繼而求其能貫也然中規之學在乎師而能貫之功則在乎我不博無以為約不約無以為貫遍覽群書上而神農軒岐張朱李劉下而醫統準繩薛氏之十六種以及指掌醫鑑無不細加詳閲究之相同者多互異者少宜遵者不過約略數言纂集成編儘可塞責其中隱而未發之義因此悟彼之妙猶未之知也先輩云熟讀王叔和不如見症多三十年來閲歷既煩有一症必有一症之理以理思症以症合理方敢下手調治又於今醫之中一長可取者虛心訪問一一筆諸笥中悠而遊焉漸積而久焉古今之妙義始得融會於吾心不揣庸陋妄蹈作述之咎更訂十數餘次苦志成書將古今奧妙深入而淺出言近而指遠高才視之鮮不以為迂然而病機之源流治法之初終俱莫遁乎是矣非敢曰醫囊無底可於是集而大備也但理路既明由此擴而充之其入於精微之地豈有他哉豫之氣稟甚怯天鑑下民加我數年再將傷寒女科素難本草終其注釋之事則天祖之生我不虛耳斯道之行廢又何足論乎時康熙庚辰菊月尚友齊陳岐德求氏自識
