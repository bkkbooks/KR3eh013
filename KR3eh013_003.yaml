body:
  text: 卷下傷酒酒者清冽之物不隨濁穢下行惟喜滲入者也滲入之區先從胃入膽膽為清淨之腑同氣相求也膽之攝受無幾其次從胃入腸膀胱滲之而出其所存之餘質惟膽獨當之是以善飲者必淺斟緩酌以俟腹中之滲若連飛數杯傾囊而出耳酒雖一物卻有數種之不同辛者能散苦者能降甘者緩而居中淡者能利小便善飲之人先天元陽本厚所以膀胱能滲但宜少飲不宜多用少則流氣活血多則耗血損神善飲者又借酒為元氣戒之則形體必瘦大抵天地之道無他中而已矣且膏粱貧賤各自有病富貴之家多色多酒不致生病貧賤之夫少飲輒病近色則損此其故何也蓋膏粱之人嗜酒者遠色近色者節飲而且無奔走負重之勞經營謀慮之苦一有酒色安寢休息厚味填補病從何來若酒色雙有者亦非美事至於貧賤不遂之人經營謀慮勞其心矣奔走負重傷其力矣再有酒色之傷神氣幾何堪如是之斫喪耶汪穎曰人知戒早飲而不知夜飲尤甚醉飽就枕熱壅三焦傷心損目夜氣收斂酒以發之亂其清明勞其脾胃停濕助火因而致病者多矣其有傷於酒者治之宜分表裡切惡寒發熱身首俱痛濕熱在經閉塞本身元氣宜用柴葛解肌湯發汗以徹皮毛之邪如譫語煩渴人事不清宜用栝蔞枳實湯大便不通脈沉有力者法當下之如有小便不利腿足發熱者酒熱積於下焦宜用加減柴苓湯諸書言酒皆云無形元氣受傷但可發汗不可妄下以傷有形陰血吾觀飲酒之時非無嘉淆未飲之前亦有穀食不可以前說為拘也按酒能亂性又能助濕奈嗜酒者隱戕其身何不知審慎如是耶柴葛解肌湯羌活乾葛柴胡川芎半夏枳殼桔梗厚朴山楂黃芩山梔甘草栝蔞枳實湯貝母栝蔞霜枳實陳皮桔梗白茯甘草山梔黃芩當歸加半夏更妙加減柴苓湯柴胡黃芩半夏甘草赤茯豬苓澤瀉赤芍枳殼厚朴黃疸疸者熱也黃疸俱因正氣不宣鬱而生黃有如遏醬相似其症有五條分縷析脈症始得而詳明也一曰濕熱發黃小便如梔染衣成黃而面目身體之黃不待言矣此因茶酒湯水聚而不散郁成壯火故成此症但有熱多濕少者有濕多熱少者有濕熱全無者不可以不辨也熱多濕少者脈來弦數黃中帶亮宜用茵陳柴苓湯若渴而飲水者宜用柴胡芍藥湯加茵陳澤瀉乃得三焦氣化行津液通渴解而黃退金匱云疸而渴者難治慮其津液枯竭初非不治之症也濕多熱少者脈來沉細而緩其色黃而晦宜用茵陳四苓湯若大便自利上氣喘急宜加參朮不可誤用寒涼傷損脾氣至於濕熱全無者既無血食酒汗之症又無黃赤小便但見身黃倦怠肢體無力虛陽上泛為黃也宜用加減八物湯今醫治此概用五苓套劑豈能愈乎谷疸者飲食鬱結正氣不行抑而成黃其症胸膈不寬四肢無力身面俱黃脈來洪滑者症屬於陽合用二陳消食之劑但火熱鬱結遏生苔衣乾澀難下今人動用蒼朴燥劑但治其食不治其熱疸之一字置於何所無怪乎治之不痊也更有粗工專用針砂緑礬等藥不思積滯雖去津液隨亡大失治疸之體惟用養血健脾湯大有殊功脈沉細緩者症屬於陰其人四肢青冷大便時溏宜用香砂理中湯加炮姜肉桂之類不可概以熱治也然谷疸之症每兼發腫初起見之無妨日久氣虛多主危殆女勞疸者身黃加以額黑也其症臍下滿悶大便時黑日晡寒熱皆蓄血之所致也男子勤於房事血不化精滯於小腹故成此症女子經水未淨交合血滯亦有此症脈來弦芤者宜用加減柴物湯若脈來細緩無力或澀而細者元氣大虛雖有蓄血不宜消導宜用十全補中大扶元氣正氣盛則邪氣自退若用消導之劑是促之使亡也然女勞之血宜在小腹若大腹盡滿血散成臌不治之症也仲景云腹滿如水者不治旨哉言乎酒為濕熱之最因酒而成疸者其人小便必如梔汁合用茵陳柴苓湯矣若心中懊憹熱不能食時欲嘔吐者濕熱積於上焦必有老痰在胃宜用清熱化痰湯若頭面目赤身熱足寒脈來寸強尺弱陽氣不能下達宜於前方加大黃下之如大便帶黑面色黃黑者其人必有蓄血蓋嗜酒之人多喜熱飲蕩死血脈積於胃中隱而未發亦宜加減柴物湯緩緩調治酒疸之黑與女勞之黑相去一間女勞為腎氣所發酒疸乃柴血腐敗之色柴物湯有半補半消之功若用大黃峻劑榮血益趨於敗而已治者明之黃汗者汗如梔汁染衣成黃多因汗出浴水水浸皮膚壅遏本身榮衛鬱而生黃也亦有內傷茶酒濕熱走於皮毛亦令發黃初起身熱惡寒頭疼身痛者可用柴陳湯加蘇葛桑皮以微散之日久津虛宜用柴胡芍藥湯此症脈多洪大無力或細緩不勻不可誤用補劑以其發熱不止必生惡瘡留結癰膿也茵陳柴苓湯柴胡黃芩半夏甘草豬苓澤瀉赤茯茵陳麥冬赤芍濕少熱多固宜分利使熱從小便而去佐以小柴胡方有清熱之功濕蒸熱鬱必先燥其肺氣所以小水不行茵陳辛涼清理肺熱肺金一潤其氣清肅下行膀胱之壅熱立通小便利而黃退矣古云治濕不利小便非其治法尤宜慎審加減八物湯人參白朮白茯甘草當歸白芍熟地石斛苡仁遠志秦艽陳皮養血健脾湯當歸白芍麥冬枳殼厚朴山楂赤茯杏仁桔梗陳皮香砂理中湯方見食門加減柴物湯柴胡黃芩半夏甘草當歸川芎白芍熟地香附玄胡丹皮丹參清熱化痰湯柴胡黃芩半夏甘草陳皮白茯杏仁山梔枳殼桔梗赤芍柴胡芍藥湯柴胡黃芩花粉甘草白芍麥冬知母積聚癥瘕痃僻痞塊血之所積因名曰積積久而後發也氣之所聚因名曰聚聚散不常之意也癥者堅也堅則難破瘕者假也假血成形痃者左右或有一條筋脈拘急大者如臂小者如指如弦之狀故名曰痃因氣而成也僻者隱在兩脅之間時痛時止故名曰癖痰與氣結也名色雖多而痞塊二字可以該之欲知治痞塊之法詳察五積其理自明肝積居於左脅大如覆杯名曰肥氣久不愈令人發厄痎瘧連歲不已心積居於臍下上至心下其大如臂名曰伏梁久不愈令人煩心肺積居於右脅大如覆杯名曰息賁久不愈令人灑淅寒熱喘咳成癰脾積在胃脘右側腹大如盤名曰痞氣久不愈令人四肢不收發為黃疸斯四積者從何而生焉蓋因飲食不消著於氣怒痰行過其處必裹一層血流過其處必裹一層痰血共裹之則不能不成塊矣但上部氣多血少不致活而成痞治以化痰為主而活血兼之宜用消積二陳湯若痛無形質不時而發者非痃即癖宜用柴胡疏肝散至於腎積居於臍下在女子多因血滯不行男子多因食積所成按之不移方為積病因於血者宜用加味柴物湯因於食者宜用二陳消食之劑至若活而成痞千金保命丹大有殊功秦越人云腎積居於臍下上下無時有若江豚拜浪名曰奔豚久不愈令人喘急骨痿少氣據此看來又有積散不常之意不可以積名也此因下焦虛寒寒氣從腰而入自後沖前所以小腹作痛宜用桂枝獨活湯溫經散邪為主不用大補內經云凡治積塊衰其大半而止塊去須大補若必欲攻之無餘多致積散成臌至於脾氣大虛神思倦怠者當以大補元氣為主正氣盛則邪氣自退此不易之法也內熱不受補者脈來弦數者極為危篤難醫雖然積塊固屬實症倘按之無形多因七情氣滯腸中汁沫與氣相摶故作痛也亦用加減柴物湯消積二陳湯陳皮半夏白茯甘草杏仁枳實玄明粉石菖蒲歸尾赤芍內熱加黃芩有滯加厚朴痛甚加莪朮柴胡疏肝散柴胡黃芩半夏甘草陳皮白茯白芍香附枳殼玄胡內熱加山梔加味柴物湯柴胡黃芩半夏甘草當歸川芎白芍熟地香附玄胡桂枝茯苓湯陳皮半夏白茯甘草香附桂枝細辛獨活腎積奔豚乃寒氣從腰眼而入腸中汁沫凝聚作痛故用二陳以行汁沫桂辛獨活以散外邪不可妄補癲狂狂者狂亂而無正定也狂叫奔走人難制伏甚則登高而歌棄衣而走逾垣上屋詈罵不避親疏此證雖屬有痰但痰多火多當以清熱為君化痰為佐宜用清火化痰湯大解心胃之熱大便結燥者可用滾痰丸下之清熱之後邪熱未淨者宜用柴胡芍藥湯如脈來沉細宜用六君健脾湯狂病原屬實熱脈宜洪大有力沉細則危法當禁其飲食不可與癲症同治也癲病語言譫妄喜笑不休此因抑鬱不遂而成脈宜沉小無力不宜洪大治用六君健脾湯蓋此病多由食積生痰天麻膽星等藥服之無效氣順痰消又宜八味地黃丸大補先天元氣此不易之法也經云重陰者癲重陽者狂乃辨症不二法門清火化痰湯黃芩黃連山梔貝母栝蔞霜枳實蘇子桔梗赤芍麥冬滾痰丸大黃八兩黃芩八兩沉香五錢礞石煅一兩此方實人可用虛者誤服立死六君健脾湯人參白朮白茯甘草陳皮半夏枳殼厚朴杏仁澤瀉炮姜癇症癇病發則仆地悶亂無知齧舌吐沫角弓反張手足搐搦或作六畜之聲古有豬羊牛馬雞癇之分以應五臟亦可不必風痰鼓其竅道其氣自變譬之弄笛者六孔閉塞不同而宮商各別也脈來洪數者症屬於陽宜用舒中二陳湯後以清癇二陳湯加減調治脈細無力者症屬於陰治之難愈宜用六君健脾湯八味地黃丸亦所必用也此病痰伏心包全要胃氣清虛方能健運日用飲食只宜少進肥甘厚味不宜屢嘗按肥甘血肉均含毒質無病人食之每生脾胃痼疾而況癇症尤要胃氣清虛庶免增痰助瘧之虞為醫者必預言之也舒中二陳湯陳皮半夏白茯甘草杏仁枳殼厚朴山梔黃芩玄明粉癲癇之病人皆責之肝風每用天麻膽星等藥不知食積生痰抑遏少陽之氣以致手足攣搐心神昏冒但治其食其病即瘳豫所屢試屢驗者也清癇二陳湯存以備參此方滌痰有餘痰盛者尤捷若久病正虛宜裁酌用之陳皮半夏白茯甘草天麻膽星栝蔞霜枳實石菖蒲桔梗麥冬黃連山梔六君健脾湯方見癲狂門三消內經曰二陽結謂之消東垣曰二陽者陽明也手陽明大腸主津液若熱則目黃口渴乃津液不足也足陽明胃主血若熱則消穀善飢血中伏火乃血不足也結謂熱結也雖有三消之分其原皆本於胃土者萬物所歸無所不有凡煎炒炙爆過飲醇酒助其胃火耗竭津液傳於氣分則為上消傳於血分則為下消若房事撙節陰氣未損者燥熱只在胃經但見消穀善飢而已上消其病在肺舌上赤裂大渴引飲此因胃火先傳於肺心復繼之經云心移熱於肺傳為膈消舉其最重者而言其實先由胃火而起也中消其病在胃善食而飢自汗時出大便堅硬小便頻數亦有口乾飲水者較之上消下消為少耳今醫治此俱有甘露飲子非不有理但滋陰養血落後一層而清熱生津尤為急著柴胡芍藥湯良不易也仲景治傷寒論云口渴者風發也以飲食消息止之見得口中作渴不但胃火所使而肝膽風熱亦復乘之徒求藥石不能速愈須以飲食之中甘蔗梨汁頻頻食之庶可免死此亦治消渴之妙法也此言歷練有準非虛僞浮誇之談下消其病在腎耳輪焦枯小便如膏其中伏有至理人所不知蓋小便如膏似屬腎虛涼藥治之無益不知腎消一症不但胃熱下流而心之陽火亦因下趨於腎宜用當歸六黃湯或六味地黃湯加犀角以治心火其消乃愈向使見其遺精不敢用涼豈不誤乎總録云未傳能食者必發腦疽背瘡為其邪火太盛也不能食者必傳中滿臌脹以其治之太過上熱未除中寒復生也岐伯曰脈實病久可治脈弦小病久不可治蓋洪數之脈邪火有餘津液猶未枯竭若脈細無力者津液既絶胃氣亦亡故不可治不得已而藥之宜於柴芍湯中加入人參甚則八味地黃丸或可起死柴胡芍藥湯柴胡黃芩花粉甘草白芍麥冬知母黃連上消中消氣分病也不可驟用血藥惟此方最合每日再用蛤蜊煎湯飲之大有奇效中消大便不利本方去黃連加大黃以微利之按闡發三消之蘊明若燃犀甘露飲天冬麥冬生地熟地茵陳枇杷葉黃芩苡仁石斛甘草山梔一方無茵陳山梔用枳殼當歸六黃湯當歸黃耆黃芩黃連黃柏生地熟地霍亂霍者揮霍眩暈亂者心神煩亂若上吐下瀉不煩亂者謂之吐瀉非霍亂也夫霍亂之因由於暑食傷脾中州鬱結清氣不得上升濁氣不得下降先心痛則先吐先腹痛則先瀉心腹俱痛者則吐瀉齊作初起之時脈多代結或見沉細最難辨其寒熱大法口渴轉筋知其為熱宜用清暑化滯湯至於霍亂已除轉筋不愈者水穀之氣傳於肝經熱傷其血則大筋為之軟短濕傷其筋則小筋為之弛長宜於消食之中佐以木瓜苡仁黃芩麥冬當歸白芍無不應也但男子之筋聚於陰器女子之筋聚於乳頭男子用手扯其陰器女子用手扯其兩乳可免轉筋入腹之死又有陰邪霍亂者脈沉細緩肢涼唇青此因冷物傷脾氣不宣通宜用厚朴溫中湯更有乾霍亂者欲吐不得吐欲瀉不得瀉心腹絞痛須臾即死當以手捥吐之方可用藥其間冷熱之治亦與前症無異也凡患此者不可與之飲食一周時許熱退身涼方可少與米飲助其元氣若痛止即食病再復來勿歸咎於醫也脈訣云霍亂之脈見微遲氣少不語大為難醫蓋言暑傷於氣正氣欲脫故難治也清熱化滯湯枳殼厚朴山楂杏仁半夏黃芩赤茯桔梗枇杷葉麥冬轉筋倍加木瓜治熱霍亂主劑他如熱甚加川連吳萸除楂朴方為合拍要在辨其有食滯否厚朴溫中湯厚朴枳殼杏仁半夏桔梗炮姜甘草藿香香茹陳皮按寒霍亂此方尚缺斟酌果系三陰經證宜從治中湯甚則四逆湯白通湯皆可隨證選擇而用惟藿茹枳桔應在刪除之列蓋邪既入陰挽之猶恐不及豈可再事耗散其真氣哉瘧疾虛人産婦病後癆怯俱有寒熱似瘧必須辨明方不誤治似瘧脈來虛濡而數不甚弦急瘧脈弦實自可辨也戴氏曰寒熱發作有期者瘧也無期者非也此亦辨之甚明最宜體認蓋少陽乃東方甲木之象故其脈主弦不但初病如此即久瘧正虛脈不鼓指而弦象亦隱然在內東垣云夏傷於暑秋必痎瘧夫暑為熱邪熱則流通何至伏藏於秋必其人汗出遇風或用冷水灌汗暑邪藏於肌肉半在於表半在於里正當少陽部分至秋金氣下降暑欲入而陰據之則激而生寒暑欲出而陽據之則激而發熱邪正相爭有殘虐之意故名曰瘧初起頭疼身痛寒多無汗者宜用人參敗毒散加乾葛半夏之類熱多汗出者宜用芎蘇柴陳湯發散之後熱多寒少胸膈不寬脈來弦滑者痰與食積也痰食在胃榮衛從出之原閉塞不舒所以肌表之中鬱而生熱宜用柴陳化滯湯若口中作渴者由少陽而入膀胱之腑熱入膀胱必傷津液宜用柴苓湯導暑從小便而出然柴苓湯一方原為小便短少而設如小便自利渴欲飲水者邪傳陽明胃經宜用柴胡芍藥湯仲景云脈弦數者風發也以飲食消息止之謂弦數之脈熱極生風必侮土而傷其津液由少陽而入陽明兩經合邪其熱倍熾當以食物速止其熱不可徒求之於藥也梨汁蔗漿正食中之生津者內經所謂風淫於內治以甘寒者是也若不用此則熱之移於胃者勢必上傳於肺而為單熱無寒之疸瘧或傳心包而為寒多熱少之牡瘧可不慎乎至於發利之後脈細無力者宜用二母補中湯若有痰食未淨宜用六君健脾湯或資生丸之類補而不愈方可用截所截之藥當分氣血兩途熱多脈數者不受溫補宜用柴胡四物湯如烏梅何首烏極驗寒多脈緩者宜用六君子湯加人參五錢此不截之截也大抵截瘧之法無非收斂氣血在壯盛之體三五發後瘧勢少衰猶可用截若虛弱之人氣道錯亂虛不歸元截之澀於他歧屢成腹脹不可不察也雖然瘧疾屬熱者多而屬寒者亦有不可泥定是熱凡當風露臥冷水浴澡陰邪客於榮衛令人寒多熱少脈來洪弦無力著眼在無力二字仲景柴胡薑桂湯真良方也若胸中作冷畏寒減食脈沉弦細者其病在裡宜用香砂理中湯總而言之一日一發者易治間日三日者難痊以其正氣虛弱澀而行遲與邪會之時緩也其有住一日連發二日或一日數發者正氣大虛散而錯亂多至不起發於午後移於午前者欲愈之兆發於午前移於午後者羈遲難愈服藥宜在未發之前發時諸經氣亂服之無效至於飲食俟其熱退身涼一兩時許方可量與若帶熱飲食多成瘧母肥甘厚味尤宜禁之調攝要言又有瘧母者老痰食積留於脅下按之有形多成痎瘧連歲不已此症脈來弦細無力甚難別其虛實大法積形堅大外無怯弱諸症脈雖沉細氣滯不能送之外出宜用柴陳拈痛湯若困倦喜臥聲音低小飲食減少者宜用香砂六君子湯大補元氣不可誤用攻伐傷損胃氣極宜辨別疸瘧者熱瘧也單熱而無寒也脈滑有滯者宜消食小便短少者宜分利弦數口渴者宜生津不可概用大寒之劑辨症確用藥自驗惟大渴引飲汗多脈來洪大者不用竹葉石膏湯斷不愈也此即少陽陽明兩經合邪上傳於肺者也牡瘧者寒瘧也寒多而熱微也如七分寒三分熱之類諸書俱言純寒無熱言之誤矣發前人所未發此即少陽陽明兩經合邪上傳於心者邪入心包都城震動周身津液協力內援重重裹擷胞內之邪為外所拒故令寒多熱少表間雖有微冷膻中全是邪熱內真熱而外假寒也宜用柴陳湯加杏仁石菖蒲最妙加減敗毒散羌活獨活柴胡前胡乾葛川芎半夏枳殼桔梗甘草芎蘇柴陳湯川芎紫蘇柴胡黃芩半夏甘草陳皮白茯汗出而熱不解邪未散也故用此方從輕解之若困倦無神胸不寬暢脈細無力竟用六君健脾湯柴陳化滯湯柴胡黃芩半夏甘草陳皮白茯枳殼厚朴山楂赤芍二母柴苓湯知母貝母柴胡黃芩半夏甘草赤茯澤瀉赤芍柴胡芍藥湯柴胡黃芩花粉甘草白芍麥冬知母二母補中湯知母貝母人參白朮黃耆甘草當歸陳皮升麻柴胡資生丸方見痢門加味柴物湯柴胡黃芩半夏甘草當歸川芎白芍熟地何首烏知母麥冬烏梅三陰痎瘧用此不截而截柴胡薑桂湯柴胡黃芩半夏甘草乾薑桂枝厚朴山楂陳皮柴陳拈痛湯柴胡黃芩半夏甘草陳皮白茯枳殼厚朴玄明粉香附鱉甲歸尾赤芍香砂六君子湯人參白朮白茯甘草半夏陳皮藿香香附砂仁寒甚者宜加薑桂竹葉石膏湯麥冬知母石膏人參粳米燈心生薑竹葉合小柴胡湯用之更妙按治疸瘧其效尤捷痢疾脈訣云痢疾脈沉細者生洪大者死此言久病也初起之時元氣未虛穀氣尚強其脈未有不滑而大者惟久病之後元氣已虛穀食又少故脈宜沉細不宜洪大也夫痢疾之起由於暑食傷脾不能運化並於血分作成痢疾其色紅者從食中之熱化其色白者從食中之冷化不可以赤為熱而白為寒也治之當分表裡丹溪曰惡寒發熱身首俱痛是為在表在表則當散暑邪入里必由皮肉而及筋骨由筋骨而入腸胃今寒熱身痛表邪未淨也若但清胃化滯不及其表則表間之邪勢必盡從里出何日可解柴胡化滯湯誠表裡兩解之良劑也治挾表痢大有捷效屢試屢驗喻氏逆流挽舟法即此方加減古方用人參敗毒散責之太陽而不責少陽未免求之太遠矣至於後重窘迫腹痛急墜是為在裡在裡則當下宜用朴黃丸下之然欲用下藥必在兩三日之間元氣未虛脈猶有力方可用下若日久痢多脈來無力雖有後重氣虛下陷與初起者不同不可妄下至於外無頭疼身痛內無裡急後重者宜用芩芍調中湯黃芩能斂大腸之氣白芍能斂大腸之血痢疾便紅非此不愈然患痢之人多由飲食不節舊積未盡新谷又多往往然也若見胸中不寬芩芍未可驟用恐其收斂飲食愈加其痢通調之後合當大補元氣但痢家氣虛者固有而陰虧者亦多下多亡陰臟腑虛燥大渴欲飲脈來細數宜用芍藥健脾湯但止其湯其痢自愈若是陽虛脈必洪大無力宜用芩芍補中湯或用資生丸補而不愈方可再行兜澀不可驟用粟殼等藥恐積滯不盡而成脹滿病愈甚也每成休息痢皆由兜澀早耳雖然腎有胃關未可久痢而胃不損者凡四君歸脾十全補中皆補脾虛未嘗不善若病在火衰土位無母設非桂附大補命門以復腎中之陽以救脾家之母飲食何由而進門戶何由而閉真元何由而復耶若畏熱不前僅以參朮補土未見痢之能愈也此皆治熱痢之法而沉寒者亦有不可泥定是熱平日元氣虛弱口食生冷涼物以致胃寒下痢脈來沉細無力四肢厥冷可為辨也宜用理中化滯湯不但冷痢如此即熱症變冷者亦往往有之李東垣云久痢不止著眼久痢二字各症不減或反加重竟作虛治用補中湯加炮姜一升一補虛回而痢自止如小腹重墜切痛奔豚加肉桂破故紙誠確論也痢家雖不禁食只宜清淡柔爛少吃為妥生冷麵食俱不相宜厚味尤當禁之至於五色兼下者如魚腦髓者或下煙塵屋漏水者大孔如竹筒唇似朱塗者皆難治之症也又有熱毒痢者水穀傾囊而出一晝夜間八九十行此則腸胃為熱毒所撓宜從里治裡急後重者宜用大黃黃連甘草大劑下之若無裡急後重宜用芩芍調中湯加黃連肉桂蓋暑邪據於腸胃涼藥入口隔拒而不納少加肉桂引涼藥直達熱所有如嚮導之兵人所不知者也若脈來沉細無力八九十行者又為氣虛下陷非前法所可治也下痢噤口者胃中濕熱之毒熏蒸清道而上以致胃口閉寒不欲飲食古方倉稟湯散其內中熱毒非散表也後以倉連人參湯頻頻與之服之不應者多主於死初起胸中不寬不欲飲食者胃中有痰有食非噤口也又有血痢者純紅散血不與糞雜故為血痢若有血又有糞者謂之便血非血痢也此因飲食傷脾中州鬱結不能攝血所以血從大孔而下亦用芩芍調中湯若脈來細數胸中如故者宜用柴胡四物湯加地榆烏梅之類勿以血痢為拘耳丹溪云先水瀉而後便膿血者脾傳腎也為賊邪治之難愈先膿血而後水瀉者腎傳脾也為微邪治之易痊論雖如此又當看其輕重先瀉後痢固為難治若下痢不甚豈難治乎先痢後瀉固為易治若瀉多不止豈易痊乎世有痢兼瘧者當以治痢為主不必治瘧若瘧後變痢發泄已盡必無暑熱之毒宜以資生丸調理其有恣意飲食釀成痢疾者又不拘於此例也柴胡化滯湯柴胡黃芩甘草丹參當歸枳殼厚朴山楂木香檳榔柴芩甘草用之以治暑也枳朴山楂用之以消食也河間曰行血則便膿自愈故用丹參當歸調氣則後重自除故用木香檳榔此方不但初病宜用即久痢身熱者亦宜用之金匱云下痢脈反弦身熱汗出者自愈夫久痢之脈深入陰分沉細微弱矣忽然而轉弦脈全是少陽生髮之氣用此逆流挽舟邪從外散寧不愈乎若脈沉細滑表裡無熱者脾氣鬱結加藿香一錢更有殊功朴黃丸大黃四兩酒煮厚朴二兩薑汁炒芩芍調中湯枳殼厚朴山楂黃岑白芍丹參桔梗檳榔澤瀉熱盛加酒炒黃連芍藥健脾湯山藥扁豆石斛萎蕤沙參白芍陳皮白茯山楂神麯花粉連芍補中湯人參白朮甘草黃耆陳皮升麻柴胡白芍黃連久痢宜忌當歸以其潤下故也去升柴加阿膠地榆尤妙資生丸人參三兩白朮二兩甘草一兩白茯兩半山楂二兩神麯二兩麥芽兩半陳皮兩半桔梗五錢山藥兩半扁豆三兩苡仁三兩藿香五錢芡實兩半澤瀉五錢黃連三錢五分白蔻三錢五分蜜丸彈子大理中化滯湯人參白朮炮姜甘草砂仁厚朴藿香陳皮寒甚加肉桂倉廩湯人參白茯甘草羌活獨活柴胡前胡川芎枳殼桔梗陳倉米石蓮肉本方不用人參服之無效脈沉者宜加藿香倉連人參湯黃連七錢陳倉米三錢人參五錢脈洪實者去人參名倉連煎外治法用大田螺一枚搗爛如泥入射一釐納入臍中引熱下行胃即開矣此法曾經試之效捷香連丸木香一兩黃連二兩泄瀉泄瀉者胃與大腸之病也此因飲食不調脾胃不能運化小水並於大腸故令作瀉脈來沉滑腹中作痛宜用胃苓湯加減以其積滯在胃氣不宣通稀糞旁流故也若久瀉不止脈沉細緩按之無力者是為脾虛宜用健脾丸參苓白朮散之類甚則用八味地黃丸補命門火以生脾土此不易之法也但泄瀉之病虛寒者固有而虛熱者亦多如下多亡陰津液不足脈來細數無力甘溫毫不可投宜用脾腎雙補湯此外又有數症條分縷析治之方不誤耳積瀉者腹痛而瀉瀉後痛減瀉去稍寬偶然而起者謂之食瀉法當消食分利若不時舉發定因脾土虛弱不能運化以致食停作瀉初起必先消食方可用補用溫世人概言脾瀉驟用溫補者非也大約脈實有力宜用胃苓湯脈細無力宜用半消半補脈之有力為實無力為虛痰瀉者或多或少或瀉或不瀉中焦有痰飲食入胃裹結不化所以作瀉脈滑有熱者宜用枳朴柴陳湯脈來弦細無力宜用香砂六君子湯火瀉者腹中痛一陳瀉一陳後去如湯後重如滯此因濕在腸胃之中火在腸胃之外宜用清熱柴苓湯甚則完穀不化者火性急速不及傳化故也冷瀉者鼻吸風寒之氣口食生冷之物皆能作瀉此暴病也宜用香砂理中湯若久瀉之後脈細皮寒病涉大虛宜於前方更加桂附若加之以不食危篤難醫至於完穀不化初起猶為胃寒治之可愈久則胃氣已絶斷主於死濕瀉者腹中不痛所瀉皆水辨證精詳或遍身發腫身熱脈數者病屬於陽分別陰陽不紊初起宜用分消飲久以柴苓湯主之若肢冷脈細元氣大虛宜用消腫健脾湯即金匱腎氣丸亦宜服也又有肺燥作瀉者人所不知秋傷於燥內熱咳嗽肺中之火無處可宣傳於大腸故令作瀉宜用清金潤燥湯潤肺兼潤其腸則泄瀉自止若誤認脾虛而用溫補非徒無益又害其肺也治者詳之又有脫瀉者水穀皆下日有百次不但糟粕瀉盡並腸中所蓄之黃水俱已竭盡而無餘所以平人時泄黃水即是脾壞之候皆主於死不易治也加減胃苓湯蒼朮厚朴陳皮甘草赤茯豬苓澤瀉山楂桔梗平胃而用蒼朮取其雄壯上行發越脾氣脾氣一行則鬱結自開若單用沉降之藥胃反不能開也但脈來沉緩者可用滑數者勿與以其燥能助火故也至於豬苓雖能滲濕脾濕不甚者服之必傷腎水不可輕用若兩肋作脹因於氣鬱者宜加香附青皮之類健脾丸人參二兩白朮三兩白茯二兩甘草一兩山藥二兩扁豆三兩芡實三兩蓮肉二兩澤瀉一兩陳皮一兩山楂三兩參苓白朮散人參白朮白茯甘草山藥扁豆苡仁桔梗砂仁蓮肉脾腎雙補湯人參山藥扁豆車前子白茯白芍萎蕤菟絲子杜仲山萸白蔻石斛枳朴柴陳湯柴胡黃芩半夏甘草陳皮白茯枳殼厚朴赤芍香砂六君子湯人參白朮白茯甘草陳皮半夏砂仁藿香香附清熱柴苓湯柴胡黃芩半夏甘草赤茯豬苓澤瀉山梔赤芍香砂理中湯人參白朮炮姜甘草香附砂仁藿香滯多加厚朴分消飲羌活白芷柴胡川芎枳殼山楂陳皮豬苓澤瀉熱盛加山梔黃芩治腫健脾湯人參白朮白茯甘草車前子澤瀉厚朴苡仁炮姜附子陳皮山藥凡久瀉脾虛以及發腫俱宜用此清金潤燥湯沙參萎蕤苡仁山藥石斛黃芩白芍桔梗甘草地骨皮陳皮芡實八仙糕痢後調理脾胃良方白朮四兩白茯四兩山藥八兩扁豆八兩芡實八兩蓮肉八兩苡仁四兩老米粉二斤白糖二斤四神丸肉果二兩煨熟去油補骨脂四兩五味一兩吳茱萸水浸炒一兩姜煮紅棗為丸補命火益脾腎要劑疝氣夫疝者痛也重墜如山故名曰疝皆厥陰肝經之病與腎經絶無干涉自素問而下皆以為寒東垣丹溪以為先有濕熱又被風寒外束所以作痛然疝有多端不可以濕熱盡也即以濕熱言之初起睪丸腫大惡寒發熱脈來弦數不時舉發者奔走勞碌飲食鬱結水穀之氣陷於至陰即為濕熱非水穀之外又有濕熱也諸書泛言濕熱而水穀之氣毫未言及所以治之不應豫從金匱論中見其言疝言腳氣以及腿縫生核胻腫不消皆言水穀之氣下注則疝氣之由食積明矣其寒熱脈數全是勞倦傷脾氣道錯亂失其運行常度郁生寒熱諸症豈盡感於風寒乎豫用柴葛二妙湯散其勞倦之火繼以柴胡化滯湯消其食積不但目前立愈並疝氣之根永除不復作矣此古人隱而不發之義經豫一言道破治疝之法了無疑義也又有微寒微熱脈雖洪弦按之無力者氣虛下陷與前症迥不相同宜用橘練補中湯其腫自消以上二症卵皮雖腫其色如故若紅腫大痛者謂之囊癰熱多濕少血熱下注日久血化為膿最難調治初用清肝滲濕湯七八日後腫而不潰者宜用滋陰內托散已潰之後全要睪丸懸掛毒從外散可保無虞若囊皮脫落連及睪丸法在不治此皆疝家常見之症而亦有不恆見者條分於左以備採用七疝症治寒疝者囊冷如冰堅硬如石陰莖不舉或控睪丸而痛此因坐臥石地寒月涉水外感寒濕而然脈沉細緩者宜用補中湯加桂枝細辛之類若脈來滑大有力標寒束其本熱也亦用柴葛二妙湯若原有疝氣反縮入內聚於小腹疼痛異常者陰寒夾食積聚不通宜用蟠蔥散水疝者皮色光亮狀如水晶脈來弦數者病為陽水宜用龍膽瀉肝湯恐其腫痛不消必致作膿脈沉細緩者又為陰水宜用五苓散筋疝者陰莖腫脹挺縱不收或有白物如精隨溺而下得之春方邪淫所使龍膽瀉肝湯清肝滲濕湯俱可量用日久病深宜用滋陰地黃丸血疝者狀如黃瓜居陰毛之上俗名便癰者是也若在腿縫之上左為魚口右為便毒非血疝也治之之法亦照囊癰調理氣疝者不痛不癢但覺腫墜此因氣怒鬱於下焦宜用柴胡平肝湯日久氣虛亦用橘練補中湯其在小兒名為偏墜得之父精怯弱強力入房因而有子胎中病也亦用橘練補中湯狐疝者晝則腫墜夜則入腹按之有聲如狐之晝出而夜歸也故名狐疝治之難愈橘練補中湯八味地黃丸審而用之㿗疝者陰囊脹大如升如斗俗名沙痼是也每見身死之後疝氣全消可見陰囊之大全是氣虛下陷苟於未大之前常服橘練補中丸亦可免其漸長不可誤認水腫妄用針刺景嶽以疝病屬氣不疏治宜舒氣為主是創言也若遇七疝皆屬氣凝治以舒氣則凝者散而疝自愈矣柴葛二妙湯柴胡黃芩半夏甘草乾葛赤芍蒼朮黃柏枳殼厚朴川芎香附橘練補中湯人參黃耆白朮甘草當歸陳皮升麻柴胡橘核川練子白芍小茴香此方雖能升提下陷氣虛甚者無參則不效清肝滲濕湯當歸川芎白芍熟地柴胡黃岑山梔龍膽草花粉甘草澤瀉木通熱盛加黃連治疝氣偏墜腫不可忍附方槐子一錢炒黑色為末入鹽三分空心黃酒調服黃酒調服滋陰內托散當歸川芎白芍熟地黃耆澤瀉皂角刺穿山甲又方杏仁去皮尖茴香各一兩蔥白焙乾五錢共為末每服五錢黃酒調服嚼核桃肉咽下蟠蔥散散寒利氣之主方蒼朮三稜砂仁丁香肉桂炮姜玄胡白茯甘草蔥白八角茴香丸山楂枳實大茴吳萸荔枝核龍膽瀉肝湯龍膽草連翹生地黃芩黃連山梔歸尾甘草澤瀉車前子木通大黃柴胡平肝湯柴胡黃芩半夏甘草白芍川芎香附腳氣腳氣者腿足腫痛也腿足之下乃肝脾腎三陰所主三陰之脈起於足之中指若當風洗足或汗出風吹風邪客之上動於氣故名腳氣初起不覺因他病乃成即如腿足紅腫惡寒發熱脈浮弦數者素有風濕又遇奔走勞役飲食鬱結水穀之氣陷於至陰故成此症宜用柴葛二妙湯散去表邪再用寬中化滯之劑自無不痊大便不通者法當下之至於白腫不紅者其候有寒濕風濕濕痰之分寒濕脈沉細緩多因坐臥濕地寒月涉水濕邪在表未郁為熱宜用補中湯加桂枝獨活之類日久寒鬱為熱不可以寒濕論也風濕脈浮弦細微微帶數風傷氣分未入於榮所以白而不紅治以發散為主不宜天涼當用疏風勝濕湯若夫脈來弦數白腫不紅者此屬濕痰宜用柴陳四妙之類不可以濕治也又有乾腳氣者不腫不紅但骨內痠痛其候有輕重之殊輕者痛而不甚脈浮弦細微微帶數亦用疏風勝濕湯重者惡寒發熱脈浮弦急痛而難忍亦因水穀之氣下陷宜用柴葛二妙湯餘邪不解可用除濕養榮之劑外有腳丫出水雖由濕熱所使亦必有風當以養血除濕為主少佐以防風獨活方為盡致至若足跟作痛多屬陰處用六味丸加苡仁木瓜杜仲五茄皮之類斯得之矣柴葛二妙湯柴胡黃芩半夏甘草赤芍乾葛蒼朮黃柏厚朴山楂木瓜檳椰此即疝氣門去川穹香附加木瓜檳榔是也疏風勝濕湯紫蘇乾葛柴胡川芎陳皮半夏前胡苡仁木瓜續斷枳殼香附黃芩柴陳四妙湯柴胡黃芩半夏甘草陳皮白茯蒼朮黃柏防風金銀花貝母花粉山梔除濕養榮湯當歸川芎白芍熟地黃芩知母木瓜苡仁續斷五茄皮牛膝杜仲車前子獨活防風秦艽痿症痿者足痛不能行也凡人壯歲之時氣血未衰或年及五旬形體不甚瘦弱者多因濕熱傷脾不能束骨未可即以痿論也蓋熱傷其血則大筋為之軟短熱傷其筋則小筋為之弛長所以機關不利宜用滋筋養榮湯脈沉細緩者宜用獨活寄生湯至於年過五十形體怯弱者此屬痿症無疑內經曰肺熱葉焦五臟因而受之發為痿躄又謂治痿必主陽明蓋言陽明胃土為諸筋之宗腎水不足不能上制心火火來刑金無以平木肝邪得以克賊脾土而痿症作矣治當補腎水之虛瀉心火之亢使肺金清而肝木有制脾自不傷也大凡初起身熱脈來洪數腿痛甚而難忍者心火流於下焦內經所謂陽精所降其人夭者是也宜用六味地黃湯加犀角牛膝木瓜麥冬之類若脈來細數痛而不甚者宜用加味地黃湯肥甘厚味辛熱烟酒既不可嘗恐助肺家之火痛愈甚也然痿症固屬肺熱若陽明氣虛宗筋失養亦令足痿宜用加味八物湯至於先天命門火衰又宜大造地黃丸之類不可拘於一法也滋筋養榮湯當歸川芎白芍熟地續斷杜仲牛膝木瓜苡仁車前五茄皮麥冬石斛獨活秦皮獨活寄生湯獨活細辛當歸防風杜仲桑寄生川芎熟地桂枝甘草秦艽牛膝白茯人參加味八物湯人參白朮白茯甘草當歸川芎白芍熟地阿膠續斷天冬杜仲山萸枸杞五味黃耆
