body:
  text: 卷上脾胃人之有脾胃猶地之有土也萬物生化於土而人之五臟六腑大經小絡以及皮肉筋骨無不資生於脾胃一身之要物也蓋命門真火乃父之精氣附於兩腎之間未有此身先有此氣出於天成不假人為所以謂之先天若夫脾胃之氣飲食五味變生五氣以奉生身全藉人為後天之氣也飲食雖能養人亦能害人欲求長生者全要飲食節制為卻病之良方飲食之所以養人者原取其氣不取其味因穀味甘淡故假五味以引之然亦不可偏嗜辛味歸肺肺盛則金來剋木肝血不生甘味歸脾脾盛則土來剋水腎精消散苦味歸心心盛則火來剋金肺氣虛耗酸味歸肝肝盛則木來剋土脾氣虧損鹹味歸腎腎盛則水來剋火心血不足今人烹炮一物必備五味全是不欲偏勝之意惟腎水多有不足故咸物獨多然亦不可偏勝也云來按若味過於辛且能傷肺耗氣損陰味過於甘且能壅氣生痰滿中味過於苦且能傷脾胃而動燥火味過於酸且能攣筋槁骨枯肌傷肺味過於咸且能傷血損肺再評此按發原本所未發每日飯食只宜八分不可儘量凡遇外有茶水家食即當減去一次每見恣意飲食之人非不節制一至食當其前不覺食指之欲動此嗜欲之性人所不自禁者也吾輩終歲用藥補益者少消導者不計其數寧非嗜欲之自戕乎日進飲食必須碎咬細齧徐徐嚥下方不傷脾食後慢行百步用手搓磨其腹庶幾飲食可消最忌食後就寢耳無所聞脾即不磨肺氣又不為之四布惟有鬱結成病而已至於夜食尤當屏絕自平旦以至日中胃氣行陽二十五度飲食易消日中以至合夜胃氣行陰二十五度飲食難消釋教過午不食其亦衛生之大則歟更有病後虛人元氣未復脾氣不能勝穀氣只須白粥調理扶助元氣肥甘硬物不但不能消化且增其病不可不察也平日調理丸藥宜用滋陰健脾丸蓋腎主藏精其所以生精生血者全賴飲食生化而輸歸於腎脾胃一強精血自足張潔古云補腎不如補脾旨哉言乎六味地黃丸一方其性孤陰但可降火不能生精苟非陰虛有火者必以健脾為主治也脾胃雖能化物而其所以化物者實是下焦水火二氣命門火衰釜底無薪其何能熟古方理中湯八味地黃丸皆知補火以生土也至若水虧不能化物者諸書毫未之及腎司五液入脾為涎腎家陰虛有火津液不足脾土乾燥健運何施予用歸芍門冬加入楂曲等藥無不應也然脾胃雖為要物而先天命門又為一身之至寶節房欲慎勞苦戒遠行其亦保養先天之一法歟滋陰健脾丸人參二兩麥冬三兩五味一兩白朮三兩白茯二兩甘草一兩山藥三兩石斛一兩陳皮一兩山楂三兩古方健脾丸乃純陽之品脾虛有寒者宜之若中宮有火不能化物者此方極妙益氣健脾湯人參白朮白茯甘草陳皮半夏山楂神麯苡仁澤瀉正氣虛飲食少當以補藥為君消食為佐若飲食多者又以消食為君補藥為佐也症非泄瀉下痢宜加當歸氣虛甚者加黃耆炮姜滯重者加厚朴養血健脾湯當歸白芍麥冬山楂神麯陳皮澤瀉白茯苡仁桔梗滯重加厚朴新增戊癸湯破故紙人參茯苓雞內金生薑菟絲子白朮甘草沙苑子大棗新增消食健脾丸枳實白朮山楂人參神麯雞內金麥芽連翹傷風風為陽邪只傷三腸不傳三陰由太陽而陽明由陽明而少陽亦有首尾只在一經者非若傷寒之傳三陰也肺為華蓋內通膀胱而為氣之主所以太陽傷風則肺亦咳凡渾身痠痛咽乾眼脹或鼻之兩旁迎香穴痛不必咳嗽汗出然後為風也治分有汗無汗無汗為感冒有汗為傷風傷風之脈浮細而緩或前小後大人身之中有衛氣有榮氣榮深而衛淺風但傷衛所以不可發表發之則汗多亡陽或津液虧損變生壞症宜用參蘇飲微解其肌仲景用稀粥以助汗者因解肌之藥不能達表故與粥以助之若腹中有滯此法又不宜用矣解散之後身熱咳嗽者此中伏有妙義經云外邪之入必與內邪相合傷風之人平日有痰有火火熏皮毛腠理不密風從火勢火借風威互相鼓煽不去其痰屢痊屢發無有已也此痰伏於肺胃之間膠黏固結非半夏可除宜用蘇杏二陳湯內有杏仁油以潤之金沸咸以軟之庶幾痰消而火降也如耳中氣閉咳嗽口苦邪傳少陽膽經宜用柴陳湯亦加杏仁金沸之類不可過用發散也三陽既盡咳嗽宜愈每見傷風久嗽不止者其故何耶真陰素虛咳久傷氣肺葉不收不治多成癆怯宜用加味地黃湯斂而降之若脈來細緩無力或洪大無力者中氣大虛土不生金宜用加減補中湯固其元氣曾見傷風氣虛隨治隨作後至氣脫而死病症雖小亦可畏也傷風汗多者衛氣不固風邪襲入榮中以致四肢微冷冷汗多出脈來沉細如絲宜用桂枝芍藥湯倍加黃耆若脈來洪大無力身熱汗出者元氣猶未大傷但用桂枝湯可也傷風面腫者咳嗽氣急脈多沉弦風邪從呼吸而入客於肺管肺葉脹大不收失其降下之令氣逆於頭面而為腫也甚則上身俱腫醫者不識呼為水腫誤人多矣宜用芎蘇散散之咳血者宜用茯苓補心湯治之肺逆失降而為膚腫且肺主皮毛故也豈可誤為水哉無汗傷風者謂之感冒因有咳嗽邪氣留連三陽不傳三陰所以較傷寒為輕也但當禁其飲食與傷風不同宜用藥芎散或人參敗毒散治之其中在經在腑悉從傷寒調治無二法也參蘇飲陳皮半夏白茯甘草桔梗枳殼前胡木香紫蘇葛根人參風盛則氣壅氣壅故痰聚是方多用順氣之品可見傷風以利氣為第一義矣醫者須識此意咳嗽聲啞者宜加黃芩按黃芩宜用枯者取輕清之義原本未分晰特重訂正蘇杏二陳湯陳皮半夏白茯甘草枳殼桔梗紫蘇杏仁金沸草桑皮此方順氣化痰於理是矣而又用紫蘇者以其餘邪未盡也胸不寬加厚朴按方中金沸草宜絹包不爾有毛射入肺而咳甚矣加味柴陳湯柴胡黃芩半夏甘草陳皮白茯枳殼杏仁金沸草加味地黃湯熟地山藥白茯山萸丹皮澤瀉麥冬五味烏梅加減益氣湯人參白朮甘草黃耆當歸陳皮麥冬五味子桂枝湯桂枝三錢白芍生用三錢甘草二錢大棗三枚浮麥一撮氣虛脈細加黃耆茯苓補心湯陳皮半夏白茯甘草枳殼桔梗前胡紫蘇乾葛當歸川芎白芍熟地萬不可用以滋陰膩膈遏伏外邪當辨外風之有無是為至要此即參蘇飲合四物湯是也參蘇一倍四物湯原是兩倍不可輕重失倫咳血者忌半夏以花粉代之川芎亦當議去按審邪正而用藥如正虛邪重當用參蘇飲二倍四物湯一倍醫貴變通而化裁之豈可執一以誤人哉芎蘇散紫蘇乾葛柴胡川芎陳皮半夏白茯甘草枳殼桔梗中寒中寒者寒邪不從陽經傳入直中陰經故曰中寒其症有輕有重重者脈來沉微一息三至腹痛唇青四肢厥冷此因先有房事胃氣衰微口食寒物鼻吸冷氣中宮不能擔當直入少陰腎臟氣冷而血不流頃刻死矣治是症者只以回陽為主雖有他症不必兼治宜用附子理中湯大劑救之此症有兼自利無脈者生氣已絕似不可治然寒極則伏生機尚存一線當以前藥浸冷與之一周時許自然脈出而解蓋厥利無脈陰盛格陽熱藥入口格絕而不入惟以前藥冷服直達病所自無格拒之患內經所謂寒因寒用者是也但脈出之時又要徐徐浮大不宜暴出暴出則氣從外脫非其所宜故仲景云微續者生暴出者死旨哉言乎又云下利清穀裡寒外熱面赤煩躁其脈即出者愈似與前說相背不知前症無熱故脈不宜暴出此症熱浮於外全要脈之速出陽通於陰豁然解矣陰症如此變幻奈何不體古訓執一方以司人命耶最可笑者庸工動用吳萸以為其性大熱可以回陽不知吳萸氣熱而味大辛辛能散氣陽未回而氣已脫較之挺刃殺人特一間耳至若舌卷囊縮自汗多出斷致不起裡寒陰症古言之矣又有非時暴寒從口鼻而入或食生冷涼物以致嘔吐痰水微寒微熱甚則昏暈不醒二便皆遺亦名中寒諸家未之詳也蓋裡寒陰症先因欲事傷腎先天命門真火不可守邪故令外邪斬關而入此則胃氣虛衰不能勝寒命門全然無恙故可一溫而愈脈雖沉細一息四至與前之三至者不同宜用香砂六君子湯少加炮姜為妙切不可兼用辛散之藥患是症者又有輕重輕者脈來洪緩按之無力寒為標而熱為本先用香砂六君子湯止其吐逆後以杏仁玄明粉加入柴陳劑中無不獲痊重者脈沉細緩香砂六君子為丸久服桂附八味丸亦不可少也按辛能散氣吳萸味辛故不可妄用以及寒為標熱為本始用香砂六君子湯以止嘔逆繼用杏仁明粉加柴陳之治皆歷練見道之言尤宜三複勿失附子理中湯人參白朮炮姜甘草肉桂附子黃耆桂附炮姜俱為熱藥但炮姜溫肺之功居多肉桂溫脾之功居多附子溫腎之功居多裡寒症重故三味合用也有汗宜加五味自利宜加茯苓更加丹參為妙以其活血故也灸法用蔥一大把以帶輕束切去兩頭留白二寸以一面熨熱置於臍上用熨斗盛炭火蔥上熨之取其熱氣從臍入腹甚者連熨二三餅香砂六君子湯陳皮半夏白茯甘草白朮人參香附砂仁藿香炮姜中寒多有胸中不寬宜加厚朴若滯重者宜去參朮按隨機應變智者之能事豈可執一以誤人哉暑熱天之六氣春主厥陰風木秋主陽明燥金冬主太陽寒水各行其政惟夏至以後秋分以前少陽相火少陰君火三氣合行其事是以天本熱也而益以日之暑日本烈也而載以地之濕三氣交運時分時合其分也以風動於中勝濕解蒸不覺其苦其合也天之熱氣下地之濕氣上人在氣交之中受其炎蒸無隙可避多有體倦神昏肌膚痱起胸膺痤出頭面癤生者矣當此之時元氣浮於肌表內存者少所以多有飲食不消而成霍亂吐瀉胸膈不寬諸症善養生者宜節飲食薄滋味為卻病之良方至於生冷瓜果尤宜節制西瓜雖能解熱食之亦必有時即如巳時申時離飲食已遠新谷未進食之毫不為殃若飲食甫離繼以瓜果勢必冷熱相摶釀成諸病也內經曰脈虛身熱得之傷暑甲乙經曰熱傷氣而不傷形所以脈虛者是也仲景分之為四弦細芤遲皆為暑脈總是元氣虛衰之象若難經所謂洪大而散者乃心之本脈不可以言暑也潔古云靜而得之為中暑動而得之為中熱此句最當領會中暑者陰症也凡乘涼於高堂大廈水閣冷亭表受寒邪周身陽氣不得發越以致頭痛惡寒身體拘急脈來浮數滑大即為夏月傷寒宜以寒法治之若脈來細緩無力方為中暑宜用香茹散暑湯至於口食生冷停滯飲食者治分陰陽二候內熱脈數宜用柴胡化滯湯脈沉細緩宜用厚朴溫中湯香茹藿香以之為君一則發散陰暑一則發越脾氣脾氣宣行積滯方得下降不獨治暑然也但脈緩者可用脈數者不宜若夫中熱之症行人農夫日中勞役或隘巷小房無處乘涼口鼻吸入熱氣以致身體大熱昏暈欲死脈沉細數者宜用辰砂六一散或柴胡芍藥湯之類不可妄投熱藥大抵肥人多濕最易召熱不能避身之濕即不能避天之熱六一散能驅濕熱從小便而出古人用之解暑有自來矣若瘦弱無濕之人津液為時令所耗當用柴胡芍藥湯藜汁蔗漿之類充其津液若用辰砂六一散妄利小水竭其下泉枯槁立至其有中熱之人脈洪盛而不虛弱者此天稟之厚暑熱客於肌肉未得深入經絡身雖燥熱毫無倦怠宜用竹葉石膏湯黃連解毒湯之類不可與脈虛者同歸一治也暑厥夏月猝然僵仆昏不知人謂之暑厥當分陰陽二症陽症脈來洪數無力身熱汗出謂之陽厥此因暑食傷脾食多而熱亦多宜用連芍調中湯或辰砂六一散先治其熱俟其人事清白再看食之多寡調治昔云中暑不得用冷得冷則死原為中暑者說非為中熱者言也今人一遇熱症動引此說總由未明中暑中熱之理也至於脈來沉細無力肌膚不熱曾食生冷瓜果謂之寒厥夏月元氣發散在外腹中空虛又遇生冷傷脾冰伏其食氣閉不通宜用厚朴溫中湯不可遽補如遇汗多身冷方可以香砂理中湯治之諸書言此不分陰陽二候混言風暑誤用升散害人不淺也又有老人虛人夏月中痰多類暑厥但中痰之人身溫不冷又無大熱口角流涎以此為別也按厥分寒熱發前人所未發學者尤當細心研究庶免草率誤人生命要在審症精詳然後用藥自無他歧之惑也中暍中暍者口渴喜飲是也其人洒洒惡寒淅淅發熱全似傷寒但傷寒脈來洪大暍症脈來細數於此可別中暍亦有洪大者其症初起即渴與傷寒之久病作渴者不同肥盛之人可用六一散清之使熱從小便而去不致傷損津液若身體黑瘦之人精血為時令所耗又以利小便為戒宜用柴胡芍藥湯生津止渴奇妙無窮按中暍與傷寒同脈來洪大者傷寒細數為中暍幾微之辨間不容髮要在細心討論而自得之伏暑暑熱發於季夏此其常也亦有伏藏日久留於少陽胸脅部分以致微寒微熱噁心自汗小便短少脈來沉弦細數即其候也宜用香茹六君子湯若脈不甚虛者去參朮名香茹二陳湯注夏立夏之後四肢痠軟困倦喜臥飲食少進名為注夏秋冬則精神如故說者皆云脾虛合用資生丸補中益氣湯矣但脈沉細緩脾肺無熱者可用此藥補之若脈來沉細又帶微數往往不受參朮其奈之何試看脾胃論中脾偏於陽無陰以濟之亦不能化物故濕熱之氣乘於四肢令人筋痿無力宜用養血健脾湯則注夏之脾虛有熱者亦當仿此施治矣其中多用酸收方為合法夏月元氣浮散在表又以汗而大泄不加酸收則浮散者不止孫真人云暑月多服五味令人氣力湧出厥有旨哉脾受濕熱熏蒸故四肢倦怠乏力用酸收以斂浮越之陰然必審無外邪方可用之香茹散暑湯香茹厚朴甘草藿香柴胡陳皮杏仁半夏香茹原利小便何以又能發散以其味辛而淡辛者先走表分後者乃入膀胱所以又能散暑也佐以藿香柴胡走表更速暑邪在經必有痰滯留結故用杏樸半夏但脈緩無熱者宜之有熱者勿服闡明立方之旨洞若觀火柴胡化滯湯方見食門厚朴溫中湯厚朴杏仁半夏枳殼桔梗炮姜甘草藿香香茹陳皮此方易曉辰砂六一散辰砂研細水飛五錢滑石磨碎水飛六兩粉草煎膏拌曬一兩六一散有辰砂能引甘滑之涼先入心經使熱與濕俱解無硃砂者但能利濕不能解熱以其無嚮導之兵也按此方旨用藥之理固已開發尚有未盡者如其人肝陽素旺外襲暑風必加青黛以清之抑肝清肺少加薄荷之辛辛能散涼能清故前人有碧玉雞蘇之名而曲盡其妙用也柴胡芍藥湯柴胡黃芩花粉甘草麥冬白芍知母黃連竹葉石膏湯黃連解毒湯俱見火門連芍調中湯枳殼厚朴山楂澤瀉陳皮桔梗白芍黃芩黃連甘草此方因其胸中不寬又兼中熱故用此方若有熱無食宜用柴胡芍藥湯暑月發厥陰厥者多陽厥者少身不熱脈不數者不可浪投香茹六君子湯人參白朮白茯甘草陳皮半夏香茹山梔黃連赤芍此方用六君子以祛痰益脾肺使正氣旺則客邪易逐矣值時當炎暑熱蒸於外濕蘊於中故用梔連以清裡茹芍以解表和榮惟脈洪數尤宜慎審未可浪投按此亦扶正逐邪之法濕濕之為病散見各門此將濕之原委逐一講貫治之方不謬也有自外而傷者有自內而中者從外而傷者即如冒雨而行霧露而處冷水灌汗濕從上受也若涉水履冰當風洗足坐臥濕地濕從下受也初起濕邪在經未郁為熱但覺骨中冷痛或皮肉微腫微微惡寒其脈細緩而不洪數可知其為寒濕也俱用人參敗毒散加減濕留日久壅遏本身正氣即成濕熱脈多洪緩數大向之細緩者今則烏有矣但看上下部分紅腫痠痛惡寒發熱者知其為濕熱也雖宜解表但可用辛涼不宜用辛溫如柴葛二妙湯上下俱可著用如寒熱已退紅腫不消宜用加減柴苓湯經云治濕不利小便非其治也可見治濕之法又以利小便為第二義矣然而利小便之法有濕則利濕無濕則損津液腫盛者可用微腫而痿弱者又當除濕養榮內經云因於濕首如裹言濕邪初客未郁為熱但覺濛昧不清如以物裹其首也又云大筋軟短小筋馳長是言濕客日久濕鬱為熱熱傷其血則大筋為之軟短濕傷其筋則小筋為之馳長明此數語方知治濕之不可過於燥矣此濕從外受者也至於濕從內中者又有上下之不同如茶酒湯水脾虛不能消散積於上焦即為上焦之濕其人頭面發腫或生癮疹是為濕中生熱治當涼散不宜溫散亦用柴葛二妙湯若其人小便不利在上之濕難於下趨又當用柴苓湯利其小便若脈來細緩無力小便色白不時淋滴而多汗一切利水之藥即不可施其有身熱足寒時頭熱面赤濕熱上壅陽氣不能下通於陰宜用柴胡湯加大黃下之濕積於下即為下焦之濕合用柴苓湯利之矣若其人惡寒發熱或兩尺洪盛餘脈沉細濕熱下壅陰氣不能上通於陽必用柴葛二妙湯散其標邪方可利水若脈來細緩小便色白者宜用獨活寄生湯助陽以驅濕亦不得不用之法也人參敗毒散羌活獨活柴胡前胡川芎枳殼桔梗人參白茯甘草寒甚者加桂枝無人參以白朮代之柴葛二妙湯柴胡黃芩半夏甘草乾葛赤芍蒼朮黃柏濕熱之脈洪數者多亦有濕邪壅滯脈沉細緩者但問身熱內煩即以此方散之在上者去黃柏加連翹加減柴苓湯柴胡黃芩半夏甘草赤茯澤瀉赤芍枳殼苡仁木瓜除濕養榮湯當歸川芎白芍熟地牛膝杜仲木瓜苡仁續斷黃芩石斛五茄皮加味柴胡湯柴胡黃岑甘草花粉白芍麥冬山梔大黃獨活寄生湯當歸川芎白芍熟地人參茯苓甘草杜仲牛膝續斷秦艽防風獨活細辛肉桂桑寄生按此方重在助陽以驅濕小溲清白脈來尺微寸緩是其的劑若濕熱未盡者尤宜三複庶免抱薪救焚之虞燥人之臟腑有血脈有津液津液又在血脈之先得心火之化變成血脈流於坎宮得命門真火之化變成真精其原生於胃輸於脾肺下灌兩腎膀胱以為一身之陰氣胃氣得之則留戀不脫若津液虧損胃為孤陽陰絕而陽亦絕古云傷寒偏死下虛人蓋有見於此也今之醫家不知津液為何物動手便用燥劑殺人慘於刀刃矣然而燥之一氣諸書從未辨明即以素問之遺亦言秋傷於虛後代名醫錯出並無一人改正其訛所以疑誤至今用藥鮮當也惟法律始詳辨之蓋言風主於春寒主於冬暑濕火兼主於夏而燥則專主於秋也立秋之後猶是夏天餘氣熱中有濕所以草木猶青一交秋分燥金司令所起之風全是一團燥烈之氣干而不潤是以無草不黃無木不凋人身應之燥病生焉闡發致燥之由較勝於喻氏凡有身熱咳嗽內煩口乾一切百病無不起於乾燥治當養血生津不可妄投燥劑戕人性命極為要緊然燥令雖主於秋凡久亢不雨津液少者亦生燥病豈獨主於秋乎治者明之柴胡芍藥湯柴胡黃芩花粉甘草白芍麥冬知母清燥救肺湯亦可用較此方尤為得宜用桑麻麥冬阿膠以滋燥杏仁梨皮以潤肺是謂有制之師也火症火症之脈洪數為順細數無力則凶亦有火盛之極而脈反沉小伏匿者即大易所謂干之上九亢龍有悔者是也臟腑之中火從何來氣之不得其平為之也有實火有虛火有相火有燥火有濕熱之火又有鬱火猛烈之火無名之火皆不可以不察也何謂實火心火燔灼胃火助之元氣未損真精未虧或因飲酒之蘊熱或因暴熱之外侵目赤喉痛胸滿氣喘宜用黃連清心湯柴胡瀉肝湯黃芩清肺湯之類若是虛火東垣之論確不可易東垣曰飲食所傷勞倦所損或氣高而喘身熱而煩症似白虎但脈來洪大虛而不長不可以實火投治當有補中益氣湯補其中氣則自愈矣倘以實火治之立見危殆又有相火者生於虛無寄於肝腎之間乃元氣之賊無時而不熬煎真陰陰虛則病陰絕則死急用滋陰地黃湯填補真陰務使水壯而火息一切涼藥毫不可施至若燥火者腸胃澀滯津血不充大便常閉先用脾約丸潤之後用地黃固本之劑若用芩連梔柏百劑無功濕火者濕生乎熱熱生乎濕濕熱相生遂成脹滿或痿與臌從而生焉故有大便久秘及更衣則又溏泄熱在腸胃之外故秘濕在腸胃之中故溏宜用柴苓湯加黃柏玄參之類不可因其泄瀉禁其寒涼若夫猛烈之火或從右脅起或從臍下起或從足底起皆為癘症丹溪以為不可驟用涼藥恐其撲之而愈張抑之而愈揚先以甘草煎湯兼瀉兼緩俟其猖狂少定量其虛實治之亦一法也鬱火者腹中作痛肌表熱四肢熱摸之烙手此因過食生冷郁遏陽氣於脾土之宜用清陽散火湯無名之火一發即不識人或狂言失志或直視聲鳴或手足瘛瘲或閉目無言或發數日而終者或一發便脫者或臥枕而逝人不及知者既無經絡之可尋又無脈症之可據內經所謂暴病暴死皆屬於火者是也可不審乎按人身肝火最烈燔灼無忌善治者先平肝火而餘臟之火自緩也黃連清心湯當歸白芍生地麥冬山梔連翹甘草薄荷柴胡瀉肝湯柴胡甘草當歸川芎青皮山梔連翹龍膽草黃芩清肺湯荊芥薄荷黃芩山梔連翹麥冬白芍桔梗甘草桑皮滋水地黃湯熟地山藥白茯丹皮山萸澤瀉麥冬白芍玄參清陽散火湯山梔黃芩白芍白芷紫蘇川芎枳殼桔梗甘草白茯風濕風濕者先傷於濕而後傷於風也其症一身盡痛比之傷寒身痛殆有甚焉因知其為風濕也風從上受濕從下受殆至兩相摶聚注經絡流關節滲骨體軀殼之間無處不到是以無處不痛也其症有輕有重輕者脈浮弦細渾身痠軟無力宜用加減柴葛湯風在外而濕在內不可大汗恐風去而濕仍存惟此輕解之劑內外之邪俱去若汗出短氣惡風不欲去衣脈沉細緩無力者宜用桂枝白朮湯助陽以驅濕不易之法也重者周身大痛脈浮洪數亦用加減柴葛湯若頭面目赤身熱足寒陽氣不能下通於陰者宜用柴陳湯加枳殼大黃以下之如發散之後上體已愈下體疼痛不止者宜用柴苓二妙湯加減柴葛湯柴胡黃芩半夏甘草乾葛赤芍紫蘇川芎山梔蒼朮續斷枳殼木瓜治風濕之法固宜散風行濕而清熱利氣之藥亦不可少蓋以濕邪在經氣滯不行鬱而成火故也桂枝白朮湯桂枝白芍甘草白朮木瓜續斷陳皮加減柴陳湯柴胡黃芩半夏甘草陳皮白茯枳殼大黃柴苓二妙湯柴胡黃芩半夏甘草赤茯赤芍澤瀉蒼朮黃柏木瓜續斷牛膝杜仲風溫風溫者先傷於風而後傷於熱也凡人先傷於風經絡之間已自有熱又感時令之熱飲食入胃氣滯不行變成濃痰濁飲膠固不散又遇新谷裹結成病其症喘渴多睡四肢不收宜用柴胡化滯湯但清其胃其病自愈然不但風溫互感後有此症凡天令久暖素有痰火者每有此恙仲景恐人誤認寒症妄用發汗故辨於傷寒門中其實非傷寒也柴胡化滯湯柴胡黃芩半夏甘草枳實厚朴山楂杏仁赤芍陳皮便閉宜加大黃濕溫濕溫者先傷於濕而後傷於暑也其症胸滿妄言兩脛逆冷此因暑濕客於脾經正氣不行鬱而為火故令語言譫妄濕熱上壅陽氣不能下通於陰故令足寒仲景恐人認為寒症誤投發散所以引入寒門其實非寒症也夫濕溫何以不可發汗蓋因濕邪在胸已自有熱又遇暑氣客之兩熱相侵猶未混合為一汗之則兩邪混合閉塞經絡不死何待耶宜用柴胡清中湯若脈來洪數或上盛下虛者加大黃以下之難經云濕溫之脈陽濡而弱陰小而急濡弱見於陽部濕氣摶暑也小急見於陰部暑氣摶濕也此言非不有理但脈之變化不齊不可執為一定耳此二句名言可佩柴胡清中湯柴胡黃芩半夏甘草枳實杏仁石菖蒲黃連赤芍暑濕侵脾必有痰食留結化痰化滯亦不可少癮疹癮疹者遍身小顆紅白不一有若痱子之狀或如黃豆樣者重者身發寒脈來洪數狀類傷寒宜用岑連敗毒散三四日不解即為夾疹感寒柴胡化滯湯實為主劑不過過用涼藥壅遏其毒輕者微寒微熱脈細微數愈而復發此因濕中生熱熱極生風宜用疏風養榮湯常服六味地黃丸滋腎水以榮肝木則虛風自息矣又有身發疙瘩有如丹毒痛癢不常膿水淋瀝者宜用解熱柴陳湯芩連敗毒散羌活獨活柴胡前胡川芎枳殼桔梗黃芩連翹甘草疏風養榮湯白芍當歸生地柴胡防風薄荷麥冬地骨皮山梔解熱柴陳湯柴胡黃岑半夏甘草陳皮白茯山梔赤芍苡仁貝母身熱加荊防膚燥加蟬衣云增痛風痛風者遍身疼痛晝減夜甚痛徹筋骨有若虎咬之狀故又名為白虎歷節風有痛而不腫者有腫而且痛者或頭生紅點指腫如捶者皆由肝經血少火盛熱極生風非是外來風邪古今諸書皆以風濕為言疑誤舛謬害人不淺素郵袁體庵先生出改正其非講明其理始知痛風由於風熱血燥也所制逍遙散一方每使病者連服百劑不終其劑者日後變為癘風屢試屢驗者也識者珍焉按袁氏心傳世乏刊本展轉抄繕錯謬甚多惟其中名言闡發啟迪後進匪淺加減逍遙散當歸白芍熟地川芎柴胡防風薄荷連翹山梔麥冬甘菊丹皮勞倦勞倦者奔走勞力之後惡寒發熱脈來弦數狀類風寒但初起必有勞倦之因自可為辨也設若勞倦而感風寒又極難辨但勞倦之人一周時許自然汗出而解若四五日不解者又屬之風寒也治之之法先用清胃散火湯治其標邪後用加味地黃湯培其根本蓋火之有餘必因水之不足少年得此日後每成虛癆不可不察也若清散之後脈沉細緩或洪大無力者治當益氣養血又非地黃丸所司也東垣言勞倦之病脈來洪大虛而不長當以甘溫補之然初起有火未可驟與必先清熱健脾方可議補闡發先後用藥之理句句詳明清胃散火湯山楂厚朴山梔黃芩陳皮枇杷葉麥冬當歸白芍防風柴胡乾葛痰火痰火為病惡風發熱脈來弦數全與傷寒無別但聽其咳嗽氣急可以知其為痰火也夫痰火之起由於脾經血少胃火太甚熬煎津液為痰上傳於肺故令咳嗽氣急然胃火一動相火翕然從之所以惡寒發熱宜用舒中芍藥湯三四劑後脈宜和緩若弦數不減數大有力是為孤陽無陰多主於死若脈來微減或細數者法當看其痰色如咳吐黃痰胸中不快食積生痰宜用栝蔞枳實湯如痰色青白稀而不稠者腎虛水沸為痰宜用加味地黃湯滋水以制火不必拘於治痰也又有初起之時外無寒熱諸症內無煩熱氣急但見神昏不安肢體無力聲音低小飲食不進脈來沉細無力者宜用香砂六君子湯甚則八味地黃丸亦可用也舒中芍藥湯陳皮半夏白茯甘草柴胡黃芩枳殼桔梗白芍木通貝母栝蔞霜天冬有食加厚朴栝蔞枳實湯陳皮白茯甘草枳實栝蔞霜貝母當歸桔梗山梔黃芩加味地黃湯熟地山藥白茯丹皮山萸肉澤瀉天冬麥冬桔梗甘草牛膝倍用香砂六君子湯陳皮半夏白茯甘草人參白朮砂仁香附藿香咳嗽有聲無痰謂之咳肺氣傷而不清也有痰無聲謂之嗽脾濕動而生痰也有聲有痰謂之咳嗽脾生痰而傳於肺也風寒勞嗽自有本條四時咳嗽不可不辨丹溪云春是上升之氣夏是火炎上最重秋是濕熱傷肺冬是風寒外束所謂上升之氣者春天木旺肝火太甚乘於肺金故令咳嗽宜用清肝寧嗽湯脈必弦數可據久而不止宜用歸芍地黃湯蓋腎水乃肝木之母腎水虛弱無以為發生滋榮之本故內熱而咳歸芍地黃是治其本也所謂火炎上者夏月心火用事乘於肺金有如金被火克五行相賊其症極重若不急治直至交秋方止咳久多成癆怯亦用歸芍地黃湯或天王補心丹無不可也所謂濕熱傷肺者秋分之後燥金用事所起之風全是一團乾燥之氣不比秋分之前熱中有濕也是以無草不黃無木不凋人身應之肺胃乾燥津液枯槁所以作咳丹溪反言濕熱傷肺當亦傳刻之誤未可執為定論也亦用歸芍地黃湯所謂風寒外束者冬月天令嚴寒易至傷人感於風者脈來細緩感於寒者脈來浮數自可辨也大抵四時咳嗽雖有不同而東南之地往往多熱多痰先用清金化痰之劑方可各治其本不可驟用地黃泥藥名言卓識極為緊關又有咳嗽氣急胸中不寬者治之宜分虛實實者脈來沉滑可用二陳消食之劑若脈來弦細微數微寒微熱大便不甚通暢欲出不出極為危險既不可攻又不可補惟有養血化痰健脾消食聽天由命而已此條諸書未有不得草草忽過辨論超豁認理真切分四時以用藥闡古書之未發按咳嗽之源內經有聚於胃關於肺之指示要在細心研究而自得也清肝寧嗽湯柴胡黃芩花粉甘草陳皮白茯當歸白芍麥冬丹皮桔梗貝母歸芍地黃湯當歸白芍麥冬桔梗熟地丹皮山藥白茯澤瀉山萸寧嗽健脾湯當歸白芍麥冬陳皮山楂神麯杏仁貝母澤瀉苡仁胸不寬加厚朴齁喘齁喘之病方書皆名哮吼為其聲之惡也此因誤啖鹽醬咸物摶結津液熬煎成痰膠黏固結聚於肺絡不容呼吸出入而呼吸正氣反觸其痰所以喘聲不止也肺有痰熱毛竅常開熱氣得以外泄所以伏而不發一遇秋冬寒氣外束邪熱不得宣通故令發喘脈來浮數滑大者宜用定喘湯發去標邪再用加減雞鳴丸常常服之自可除根每日飲食只宜清淡不宜濃厚蓋人身之痰不能自動必隨脾之健運貯於肺絡結為窠囊積飲如蜂子之穴於房中蓮實之嵌於蓬內生長則易而剝落則難全要胃氣清虛則痰之上注者得以返還於胃然後可從口而上越或從腸而下達今人肥甘厚味日不絕口兼之飲食不節雖有醫藥庸有濟乎此乃氣分之病或有傳於血分而為喘急失血者先吐痰後見血猶為積熱先吐血後吐痰者陰虛火動照依怯症調治一切燥藥毫不可嘗推而廣之齁病屬熱者固多而肺寒者亦有不可泥定是熱凡脾胃虛寒氣不能運積成冷痰上注於肺亦成齁喘其人四肢厥冷脈沉細緩按之無力即其候也宜用六君子湯加款冬金沸杏仁炮姜治之但熱者多而寒者少又不可不察耳齁喘之病痰火為本而外感內傷之因所觸不同未可以一端盡也寒傷肺喘脈必數大可用定喘湯散風傷肺喘脈必細緩自汗惡風宜用參蘇飲解之因於氣者其脈必沉因於食者脈必弦滑因於色者脈沉細數治之又有不同今人一遇是症便以定喘為主何致膠固若此耶定喘湯半夏杏仁冬花蘇子桑皮麻黃甘草黃芩白果青鉛生薑加減雞鳴丸陳皮一兩半夏四錢白茯一兩甘草五錢貝母一兩栝蔞霜一兩冬花一兩天冬二兩黃芩一兩知母一兩桔梗一兩枇杷葉五錢玄明粉三錢煉蜜為丸青筋青筋之症惡寒發熱狀似風寒但胸腹作痛遍身發麻或唇口作麻即其症也北方謂之青筋南方謂之烏沙此因鬱怒傷肝木邪賊土觸動濕痰氣逆而血亦逆故令脹痛欲死脈來洪數者宜用活血化痰湯若脈來細緩四肢厥冷者宜用香砂理中湯古方治此不過清熱消食而疏氣活血之藥毫不知用內經云通則不痛痛則不通氣血不得宣行後成此病宣通氣血為第一義也但此血氣上攻多有暴病暴死者不可不知也活血化痰湯陳皮半夏白茯甘草大腹皮枳殼木香玄胡歸尾黃芩香砂理中湯人參白朮炮姜甘草香附砂仁藿香加玄胡半夏木香氣怒肝為將軍之官不受屈制怒氣傷肝其氣衝逆上行有若將軍之不可犯故名將軍傷之輕者兩脅刺痛胸中不舒傷之重者未經發泄乘於胃土令人昏迷不語牙關緊急蓋因胃中有痰肝氣入胃觸動痰涎其支脈之絡心者被其壅滯堵塞神氣出入之竅故不識人也內經云暴喑為病不必服藥少頃氣行則蘇然而痰聚胸中正氣得復則生不復則死不可坐視宜用清郁二陳湯又有氣怒之後人事清白但覺胸中刺痛喘急不安能坐不能臥者氣逆膻中血亦留滯宜用加減柴物湯若脈來沉細無力胸中痛而不甚者宜用歸脾八珍之類不可以氣為拘也八珍歸脾當在清郁化痰之後為善後計若用在鬱氣未疏之時恐其氣因補而壅滯又非所宜清郁二陳湯陳皮半夏白茯甘草川芎香附枳殼杏仁白芍黃芩加減柴物湯柴胡黃芩半夏甘草當歸川芎白芍熟地玄胡木香麥冬杏仁中惡中惡者入廟登塚弔死問疾飛屍鬼擊故為中惡其症牙關緊急昏不知人似乎中痰但頭面青黑肌膚粟起可以知其中惡也內經云大凡外邪之入必與內邪相合中惡之人先有痰食在胃正氣不旺然後鬼昧得以犯之治是症者當以安神化痰為先俟其氣順痰消方可議補薛立齋云中惡先因正氣大虛然後為惡所中治當大補元氣勿以痰治然初起必先化痰不可顧母失子也安神化痰湯茯神遠志陳皮半夏杏仁石菖蒲麥冬桔梗甘草有食加枳殼厚朴傷食方書云人迎緊盛傷於寒氣口緊盛傷於食以是知傷食之脈專以氣口為主也然診視之時有氣口脈沉伏者有氣口脈滑大者又有人迎氣口俱弦數者紛紛不一不可以一說拘也夫人迎氣口脈俱弦數外症日晡寒熱頭亦微痛全與風寒無異但神氣如故身無疼痛可以為別也脾胃之氣稟於命門命門凝然不動下焦為之臣使宣布其氣行至中焦入於脾胃乃能化食今因飲食鬱遏少陽三焦之氣不得宣通故生寒熱諸症醫者不識呼為寒疾誤人多矣宜用柴胡化滯湯通表裡而雙解之食重者宜下若外無寒熱表症但覺胸膈不寬者痰裹食而不化也宜用加味二陳湯又有生冷傷脾者脈來沉緩無力審脈之有力無力而定虛實之治宜用香砂理中湯更有胸腹不覺咳嗽氣急四肢無力大便不甚通暢脈沉弦細按之無力下焦雖是虛寒中焦又有浮熱先以養血健脾湯開其痰食再以八味地黃丸實其下焦方為得法至若飲食積久或傷之太過中氣閉塞以致猝然僵仆昏不知人名為食厥甚則四肢拘攣狀如中痰亦用加味二陳湯脈沉細緩者宜加薑桂不可誤認痰症妄用痰劑柴胡化滯湯柴胡黃芩半夏甘草枳殼厚朴山楂蘇子桔梗傷食而用柴胡以其能升少陽之氣也加味二陳湯陳皮半夏白茯甘草枳殼厚朴杏仁山楂蘇子桔梗大凡消食化痰必須順氣胸中不寬故用蘇桔若在臍腹以下宜用青皮香附香砂理中湯人參白朮炮姜甘草砂仁香附藿香滯重去白朮加枳殼厚朴寒甚加肉桂養血健脾湯方見脾胃門沖和丸陳皮半夏枳殼厚朴神麯杏仁各一兩黃芩桔梗各五錢脾居中央寒之不覺其寒熱之不覺其熱飲食易化百病不生故云沖和今為飲食所傷失其舊職用此消其積滯復其沖和之舊矣故以沖和為名痰滯膠固者再加莪朮物性相製藥索粉不化宜加杏仁狗肉亦用牛肉傷加紅曲魚傷加橄欖麵食豆腐加蘿蔔子粽子黏食加白酒藥肉食加山楂果子蔬菜加麝香煎炒厚味加淡豆豉
